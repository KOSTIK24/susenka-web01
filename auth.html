<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Přihlášení • Sušenka Web</title>
  <link rel="stylesheet" href="./style.css">
  <script src="./script.js" defer></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="./images/susenka-logo.png" alt="logo" class="brand-logo" id="topbar-avatar"/>
      <span class="brand-name" id="topbar-username">Sušenka <b>Web</b></span>
    </div>
    <nav class="nav">
      <a href="./index.html">Domů</a>
      <a href="./hra.html">Hra</a>
      <a href="./team.html">Tým</a>
      <a href="./kontakt.html">Kontakt</a>
      <a href="./faq.html">FAQ</a>
      <a href="./pages/pravidla.html">Pravidla</a>
      <a href="auth.html" id="logout-link" style="display:none;" onclick="logoutUser()">Odhlásit</a>
    </nav>
  </header>

  <main class="container">
    <section class="card animate-pop" style="max-width:720px; margin:0 auto;">
      <h1>Přihlášení / Registrace</h1>
      <div style="display:flex; gap:18px; flex-wrap:wrap;">

        <!-- LOGIN -->
        <div style="flex:1; min-width:260px;">
          <h3>Přihlásit se</h3>
          <label>Uživatelské jméno</label><br>
          <input id="login-name" placeholder="např. susenka3" style="width:100%;padding:8px;margin:6px 0;border-radius:8px;border:1px solid rgba(255,255,255,.06)"><br>
          <label>Heslo</label><br>
          <input id="login-pass" type="password" placeholder="heslo" style="width:100%;padding:8px;margin:6px 0;border-radius:8px;border:1px solid rgba(255,255,255,.06)"><br>
          <button class="btn primary" id="btn-login">Přihlásit</button>
        </div>

        <!-- REGISTER -->
        <div style="flex:1; min-width:260px;">
          <h3>Registrovat</h3>
          <label>Uživatelské jméno</label><br>
          <input id="reg-name" placeholder="nové jméno" style="width:100%;padding:8px;margin:6px 0;border-radius:8px;border:1px solid rgba(255,255,255,.06)"><br>
          <label>E-mail</label><br>
          <input id="reg-email" type="email" placeholder="např. susenky17@gmail.com" style="width:100%;padding:8px;margin:6px 0;border-radius:8px;border:1px solid rgba(255,255,255,.06)"><br>
          <label>Heslo</label><br>
          <input id="reg-pass" type="password" placeholder="heslo" style="width:100%;padding:8px;margin:6px 0;border-radius:8px;border:1px solid rgba(255,255,255,.06)"><br>
          <label>Profilovka (URL) nebo vyber:</label><br>
          <input id="reg-avatar" placeholder="https://..." style="width:100%;padding:8px;margin:6px 0;border-radius:8px;border:1px solid rgba(255,255,255,.06)"><br>
          <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px;">
            <img class="avatar-choice" src="https://i.imgur.com/3GxZ8k4.png" data-src="https://i.imgur.com/3GxZ8k4.png" width="56" height="56">
            <img class="avatar-choice" src="https://i.imgur.com/y6Y2z6d.png" data-src="https://i.imgur.com/y6Y2z6d.png" width="56" height="56">
            <img class="avatar-choice" src="https://i.imgur.com/8Qf4bPj.png" data-src="https://i.imgur.com/8Qf4bPj.png" width="56" height="56">
          </div>
          <button class="btn" id="btn-register">Vytvořit účet</button>
        </div>
      </div>

      <p style="margin-top:14px;color:var(--muted)">💡 Po přihlášení se profil zobrazí nahoře v liště. Vedoucí e-mail má speciální oprávnění.</p>
      <p id="auth-status" style="margin-top:10px;min-height:20px;color:#ffb3c1"></p>
    </section>
  </main>

  <footer class="footer">© 2026 Sušenka Web</footer>

  <script>
    const loadUsers = () => JSON.parse(localStorage.getItem("users") || "{}");
    const saveUsers = (u) => localStorage.setItem("users", JSON.stringify(u));
    const statusEl = document.getElementById("auth-status");

    let selectedAvatar = "";

    document.querySelectorAll(".avatar-choice").forEach((img) => {
      img.style.cursor = "pointer";
      img.addEventListener("click", () => {
        document.querySelectorAll(".avatar-choice").forEach((x) => {
          x.style.outline = "none";
        });
        img.style.outline = "2px solid #8f7aff";
        selectedAvatar = img.dataset.src || img.src;
      });
    });

    document.getElementById("btn-register")?.addEventListener("click", () => {
      const username = document.getElementById("reg-name")?.value?.trim();
      const email = document.getElementById("reg-email")?.value?.trim();
      const password = document.getElementById("reg-pass")?.value || "";
      const avatarInput = document.getElementById("reg-avatar")?.value?.trim();
      const avatar = avatarInput || selectedAvatar || "./images/susenka-logo.png";

      if (!username || !email || !password) {
        statusEl.textContent = "❌ Vyplň uživatelské jméno, e-mail i heslo.";
        return;
      }

      const users = loadUsers();
      if (users[username]) {
        statusEl.textContent = "❌ Toto uživatelské jméno už existuje.";
        return;
      }

      users[username] = {
        email,
        password,
        avatar,
        role: email === "susenky17@gmail.com" ? "vedouci" : "clen",
        cookies: 0,
        inventory: []
      };

      saveUsers(users);
      localStorage.setItem("currentUser", username);
      statusEl.textContent = "✅ Účet vytvořen. Přesměrovávám…";
      setTimeout(() => {
        location.href = "./index.html";
      }, 400);
    });

    document.getElementById("btn-login")?.addEventListener("click", () => {
      const username = document.getElementById("login-name")?.value?.trim();
      const password = document.getElementById("login-pass")?.value || "";
      const users = loadUsers();
      const user = users[username];

      if (!user || user.password !== password) {
        statusEl.textContent = "❌ Špatné uživatelské jméno nebo heslo.";
        return;
      }

      localStorage.setItem("currentUser", username);
      statusEl.textContent = "✅ Přihlášení proběhlo. Přesměrovávám…";
      setTimeout(() => {
        location.href = "./index.html";
      }, 300);
    });

    window.logoutUser = function () {
      localStorage.removeItem("currentUser");
      statusEl.textContent = "✅ Odhlášeno.";
    };
  </script>
</body>
</html>
