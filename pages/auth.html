<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔐 Přihlášení • Sušenka Web</title>

  <!-- 🔮 Stejný globální styl -->
  <link rel="stylesheet" href="../style.css" />

  <style>
    /* === Rozložení stejné jako hra, jen centrované === */
    main.container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 120px);
      padding: 10px;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .auth-card input {
      width: 100%;
      margin-bottom: 12px;
    }
  </style>
</head>

<body>
  <!-- 🔝 TOPBAR – STEJNÝ -->
  <header class="topbar">
    <div class="brand">
      <img src="../images/susenka-logo.png"
           alt="logo"
           class="brand-logo"
           id="topbar-avatar" />
      <span class="brand-name" id="topbar-username">
        Sušenka <b>Web</b>
      </span>
    </div>
    <nav class="nav">
      <a href="../index.html">Domů</a>
      <a href="hra.html">Hra</a>
      <a href="team.html">Tým</a>
      <a href="faq.html">FAQ</a>
      <a href="pravidla.html">Pravidla</a>
    </nav>
  </header>

  <!-- 🔐 OBSAH -->
  <main class="container">
    <section class="card auth-card animate-pop">
      <h2>🔐 Přihlášení</h2>
      <p style="opacity:.7;margin-bottom:18px;">
        Přihlas se do <b>Sušenka Web</b>
      </p>

      <input id="email" type="email" placeholder="Email">

      <input id="password" type="password" placeholder="Heslo">

      <div style="display:flex;gap:10px;justify-content:center;margin-top:6px;">
        <button class="btn primary" onclick="login()">Přihlásit se</button>
        <button class="btn" onclick="register()">Registrovat se</button>
      </div>

      <p id="status"
         style="margin-top:14px;min-height:20px;font-size:14px;color:#ff9aa2;">
      </p>
    </section>
  </main>

  <footer class="footer">© 2026 Sušenka Web</footer>

  <!-- 🔥 Firebase SDK – STEJNÉ JAKO VE HŘE -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <script>
    console.log("🔥 auth.html – stejný styl jako hra");

    const firebaseConfig = {
      apiKey: "AIzaSyCKHgsrhvBqciCDCd03r4ukddxIxP95m94",
      authDomain: "susenka-web-chat.firebaseapp.com",
      databaseURL: "https://susenka-web-chat-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "susenka-web-chat",
      storageBucket: "susenka-web-chat.firebasestorage.app",
      messagingSenderId: "625704029177",
      appId: "1:625704029177:web:d8510c07f534df48134b28",
      measurementId: "G-012LNBPFGJ"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
      console.log("✅ Firebase inicializován (auth)");
    }

    const auth = firebase.auth();
    const db = firebase.database();
    const statusEl = document.getElementById("status");

    function usernameFromEmail(email) {
      return (email || "").split("@")[0].replace(/[^a-zA-Z0-9._-]/g, "_") || "user";
    }

    function saveUserProfile(email) {
      const username = usernameFromEmail(email);
      return db.ref("users/" + username).update({
        username,
        email,
        role: "clen"
      });
    }

    function formatAuthError(err) {
      const code = err?.code || "";
      const msg = err?.message || "";

      if (code === "auth/invalid-api-key" || msg.includes("API key not valid")) {
        return "❌ Neplatný Firebase API klíč nebo nepovolená doména v Firebase Auth.";
      }
      if (code === "auth/invalid-login-credentials") {
        return "❌ Špatný email nebo heslo.";
      }
      if (code === "auth/invalid-email") {
        return "❌ Neplatný formát emailu.";
      }
      if (code === "auth/email-already-in-use") {
        return "❌ Tento email už je registrovaný.";
      }
      if (code === "auth/weak-password") {
        return "❌ Heslo je moc slabé (min. 6 znaků).";
      }
      if (code === "auth/network-request-failed") {
        return "❌ Chyba sítě. Zkus to prosím znovu.";
      }
      return `❌ ${code || msg || "Neznámá chyba přihlášení."}`;
    }

    function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      statusEl.textContent = "Přihlašuji…";

      auth.signInWithEmailAndPassword(email, password)
        .then(() => saveUserProfile(email))
        .then(() => {
          statusEl.textContent = "✅ Přihlášeno";
          location.href = "../index.html";
        })
        .catch(err => {
          statusEl.textContent = formatAuthError(err);
          console.error("Login error:", err);
        });
    }

    function register() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      statusEl.textContent = "Registruji…";

      auth.createUserWithEmailAndPassword(email, password)
        .then(() => saveUserProfile(email))
        .then(() => {
          statusEl.textContent = "✅ Registrováno";
          location.href = "../index.html";
        })
        .catch(err => {
          statusEl.textContent = formatAuthError(err);
          console.error("Register error:", err);
        });
    }
  </script>
</body>
</html>
